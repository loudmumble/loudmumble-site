version: 2
updates:
  # Keep SHA-pinned GitHub Actions current. Dependabot updates both the pinned
  # commit SHA and the trailing "# vX.Y.Z" comment when a new release ships.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      # One PR for all action bumps instead of one per action.
      github-actions:
        patterns:
          - "*"

  # Keep npm dependencies patched. Minor/patch bumps are batched into a single
  # weekly PR to cut noise; major bumps come as separate PRs so potentially
  # breaking changes get reviewed individually.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Defer Tailwind v4 — it's a breaking rewrite that needs a deliberate
      # migration. tailwind-merge v3 targets v4, so hold it to v2 to match.
      # Remove these blocks when ready to migrate to Tailwind v4.
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwind-merge"
        update-types: ["version-update:semver-major"]
